<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PepsiCo Pull List</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pepsi-blue: #004B93; --pepsi-red: #E3001B; --pepsi-light: #0078D4;
    --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235; --border: #1e2d45;
    --text: #e8edf5; --muted: #6b7fa0; --accent: #00aaff;
    --green: #00d68f; --yellow: #ffcc00; --red: #ff3b5c;
    --cooler-color: #4da6ff; --shelf-color: #00d68f; --display-color: #c07af0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--pepsi-blue) 0%, #001f4a 100%);
    border-bottom: 3px solid var(--pepsi-red);
    padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
    height: 56px; flex-shrink: 0; z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-globe { width: 32px; height: 32px; border-radius: 50%; background: conic-gradient(var(--pepsi-red) 0deg 130deg, white 130deg 200deg, var(--pepsi-blue) 200deg 360deg); border: 2px solid rgba(255,255,255,0.25); flex-shrink: 0; }
  .logo-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 18px; letter-spacing: 1px; color: white; line-height: 1; }
  .logo-sub { font-size: 8px; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; font-weight: 600; }
  .store-badge { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: white; cursor: pointer; transition: all 0.15s; }
  .store-badge:hover { background: rgba(255,255,255,0.2); }
  .header-actions { display: flex; gap: 8px; }
  .btn { padding: 7px 14px; border-radius: 7px; border: none; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--pepsi-red); color: white; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
  .btn-ghost:hover { border-color: white; color: white; }
  .btn-blue { background: var(--pepsi-blue); color: white; }
  .btn-blue:hover { background: var(--pepsi-light); }

  /* TAB BAR */
  .tab-bar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: stretch; padding: 0 16px; gap: 2px; flex-shrink: 0; z-index: 100; }
  .tab-btn { padding: 0 20px; height: 44px; border: none; background: transparent; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 7px; border-bottom: 3px solid transparent; margin-bottom: -1px; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active-cooler  { color: var(--cooler-color);  border-bottom-color: var(--cooler-color); }
  .tab-btn.active-shelf   { color: var(--shelf-color);   border-bottom-color: var(--shelf-color); }
  .tab-btn.active-display { color: var(--display-color); border-bottom-color: var(--display-color); }
  .tab-count { font-size: 11px; padding: 1px 6px; border-radius: 10px; background: var(--surface2); color: var(--muted); }
  .tab-btn.active-cooler  .tab-count { background: rgba(77,166,255,0.15);  color: var(--cooler-color); }
  .tab-btn.active-shelf   .tab-count { background: rgba(0,214,143,0.15);   color: var(--shelf-color); }
  .tab-btn.active-display .tab-count { background: rgba(192,122,240,0.15); color: var(--display-color); }

  /* BODY */
  .body-wrap { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 200px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 16px; }
  .section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .store-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 11px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
  .store-input:focus { border-color: var(--accent); }
  .store-list { list-style: none; display: flex; flex-direction: column; gap: 2px; margin-top: 8px; }
  .store-item { padding: 7px 9px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: space-between; transition: all 0.15s; color: var(--muted); border-left: 3px solid transparent; }
  .store-item:hover { background: var(--surface2); color: var(--text); }
  .store-item.active { background: rgba(0,75,147,0.25); color: var(--accent); border-left-color: var(--accent); }
  .store-item-left { display: flex; align-items: center; gap: 7px; }
  .store-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; opacity: 0.6; }
  .store-del { opacity: 0; font-size: 10px; color: var(--red); padding: 2px 4px; cursor: pointer; }
  .store-item:hover .store-del { opacity: 1; }
  .cat-filters { display: flex; flex-direction: column; gap: 2px; }
  .cat-btn { padding: 6px 9px; border-radius: 6px; border: 1px solid transparent; background: transparent; color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; text-align: left; transition: all 0.15s; display: flex; justify-content: space-between; align-items: center; }
  .cat-btn:hover { background: var(--surface2); color: var(--text); }
  .cat-btn.active { background: rgba(0,75,147,0.2); border-color: rgba(0,120,212,0.4); color: var(--text); }
  .cat-count { background: var(--surface2); border-radius: 10px; padding: 1px 6px; font-size: 10px; color: var(--muted); }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .page { display: none; flex-direction: column; height: 100%; overflow: hidden; }
  .page.active { display: flex; }

  /* SIZE FILTER BAR */
  .size-filter-bar { display: flex; gap: 6px; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; align-items: center; flex-wrap: wrap; }
  .size-filter-btn { padding: 4px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; }
  .size-filter-btn:hover { color: var(--text); border-color: var(--text); }
  .size-filter-btn.active { color: white; border-color: transparent; }
  .sfb-all.active    { background: var(--pepsi-blue); }
  .sfb-20oz.active   { background: #0066cc; }
  .sfb-2L.active     { background: #008855; }
  .sfb-12pk.active   { background: #7733aa; }
  .sfb-24pk.active   { background: #994400; }

  .display-toggle { display: flex; gap: 5px; margin-left: auto; }
  .toggle-btn { padding: 4px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; }
  .toggle-btn:hover { border-color: var(--display-color); color: var(--display-color); }
  .toggle-btn.active { background: var(--display-color); border-color: var(--display-color); color: white; }

  /* SCROLLABLE TABLE AREA */
  .table-wrap { flex: 1; overflow-y: auto; }

  /* SIZE GROUP HEADERS */
  .size-group { }
  .size-group-header { position: sticky; top: 0; z-index: 10; background: var(--bg); padding: 8px 16px 6px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .size-group-pill { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; padding: 3px 14px; border-radius: 20px; }
  .pill-20oz  { background: rgba(0,102,204,0.2);  color: #4da6ff; }
  .pill-2L    { background: rgba(0,136,85,0.2);   color: #00cc77; }
  .pill-12pk  { background: rgba(119,51,170,0.2); color: #cc88ff; }
  .pill-24pk  { background: rgba(153,68,0,0.2);   color: #ff9944; }
  .size-group-count { font-size: 11px; color: var(--muted); }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); }
  th { padding: 8px 12px; text-align: left; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  th.center { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  td { padding: 9px 12px; font-size: 13px; }
  .brand-row td { background: rgba(255,255,255,0.03); padding: 5px 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .prod-name { font-weight: 600; color: var(--text); font-size: 13px; }
  .na-toggle { width: 14px; height: 14px; cursor: pointer; accent-color: var(--muted); }

  /* STEPPERS */
  .stepper { display: inline-flex; align-items: center; gap: 3px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 3px 5px; }
  .stepper.stepper-disabled { opacity: 0.25; pointer-events: none; }
  .step-btn { height: 26px; border-radius: 6px; border: none; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; padding: 0 7px; white-space: nowrap; }
  .step-btn:active { transform: scale(0.92); }
  .step-minus { background: rgba(227,0,27,0.18); color: var(--red); }
  .step-minus:hover { background: rgba(227,0,27,0.35); }
  .step-plus { background: rgba(0,75,147,0.32); color: #7bc8ff; }
  .step-plus:hover { background: rgba(0,120,212,0.5); color: white; }
  .step-divider { width: 1px; height: 18px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
  .step-val { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900; min-width: 30px; text-align: center; color: var(--text); }

  /* PULL PANEL */
  .pull-panel { width: 280px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, rgba(0,75,147,0.25), transparent); }
  .panel-title { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 900; letter-spacing: 1px; }
  .panel-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .panel-body { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .panel-footer { padding: 12px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .pull-section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 12px 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .pull-section-label:first-child { margin-top: 0; }
  .pull-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 11px; border-radius: 8px; margin-bottom: 5px; background: var(--surface2); border-left: 3px solid var(--yellow); }
  .pull-item.large { border-left-color: var(--red); }
  .pull-item-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .pull-item-size { font-size: 11px; color: var(--muted); }
  .pull-item-qty { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; color: var(--yellow); flex-shrink: 0; margin-left: 8px; }
  .pull-item.large .pull-item-qty { color: var(--red); }
  .empty-pull { text-align: center; padding: 36px 14px; color: var(--muted); font-size: 12px; line-height: 1.7; }
  .empty-icon { font-size: 28px; margin-bottom: 8px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 900; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }

  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-globe"></div>
    <div><div class="logo-text">PEPSICO</div><div class="logo-sub">Pull List</div></div>
  </div>
  <button class="store-badge" onclick="openStoreModal()">🏬 <span id="headerStore">Walmart #1042</span> ▾</button>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="window.print()">🖨 Print</button>
    <button class="btn btn-primary" onclick="generatePull()">▶ Generate</button>
  </div>
</header>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active-cooler" id="tab-cooler" onclick="switchTab('cooler')">🧊 Cooler <span class="tab-count" id="tc-cooler">—</span></button>
  <button class="tab-btn" id="tab-shelf"   onclick="switchTab('shelf')">🛒 Shelf <span class="tab-count" id="tc-shelf">—</span></button>
  <button class="tab-btn" id="tab-display" onclick="switchTab('display')">🏪 Display <span class="tab-count" id="tc-display">—</span></button>
</div>

<!-- BODY -->
<div class="body-wrap">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div>
      <div class="section-label">Filter by Brand</div>
      <div class="cat-filters" id="catFilters"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- ══ COOLER PAGE ══ -->
    <div class="page active" id="page-cooler">
      <div class="size-filter-bar">
        <button class="size-filter-btn sfb-all active" onclick="setSizeFilter('cooler','all',this)">All</button>
        <button class="size-filter-btn sfb-20oz" onclick="setSizeFilter('cooler','20oz',this)">20oz</button>
        <button class="btn btn-ghost" style="margin-left:auto;font-size:11px;padding:4px 10px;" onclick="clearSection('cooler')">Clear</button>
      </div>
      <div class="table-wrap" id="coolerTableWrap">
        <div id="coolerContent"></div>
      </div>
    </div>

    <!-- ══ SHELF PAGE ══ -->
    <div class="page" id="page-shelf">
      <div class="size-filter-bar">
        <button class="size-filter-btn sfb-all active" onclick="setSizeFilter('shelf','all',this)">All</button>
        <button class="size-filter-btn sfb-2L"   onclick="setSizeFilter('shelf','2L',this)">2-Liter</button>
        <button class="size-filter-btn sfb-12pk" onclick="setSizeFilter('shelf','12pk',this)">12-Pack</button>
        <button class="size-filter-btn sfb-24pk" onclick="setSizeFilter('shelf','24pk',this)">24-Pack</button>
        <button class="btn btn-ghost" style="margin-left:auto;font-size:11px;padding:4px 10px;" onclick="clearSection('shelf')">Clear</button>
      </div>
      <div class="table-wrap" id="shelfTableWrap">
        <div id="shelfContent"></div>
      </div>
    </div>

    <!-- ══ DISPLAY PAGE ══ -->
    <div class="page" id="page-display">
      <div class="size-filter-bar">
        <button class="size-filter-btn sfb-all active" onclick="setSizeFilter('display','all',this)">All</button>
        <div class="display-toggle">
          <button class="toggle-btn active" onclick="setDisplaySize('12pk',this)">12-Pack</button>
          <button class="toggle-btn" onclick="setDisplaySize('24pk',this)">24-Pack</button>
        </div>
        <button class="btn btn-ghost" style="font-size:11px;padding:4px 10px;" onclick="clearSection('display')">Clear</button>
      </div>
      <div class="table-wrap" id="displayTableWrap">
        <div id="displayContent"></div>
      </div>
    </div>

  </div>

  <!-- PULL PANEL -->
  <div class="pull-panel">
    <div class="panel-header">
      <div class="panel-title">📋 PULL LIST</div>
      <div class="panel-meta" id="pullMeta">Enter quantities &amp; generate</div>
    </div>
    <div class="panel-body" id="pullBody">
      <div class="empty-pull"><div class="empty-icon">📦</div>Use the tabs to enter pull quantities, then hit <strong>Generate</strong>.</div>
    </div>
    <div class="panel-footer">
      <button class="btn btn-ghost" style="flex:1;color:var(--muted);border-color:var(--border);" onclick="clearAll()">Clear All</button>
      <button class="btn btn-primary" style="flex:1;" onclick="generatePull()">Generate</button>
    </div>
  </div>

</div>

<!-- STORE MODAL -->
<div class="modal-overlay" id="storeModal" onclick="if(event.target===this)closeStoreModal()">
  <div class="modal">
    <div class="modal-title">Stores / Accounts <button class="modal-close" onclick="closeStoreModal()">✕</button></div>
    <input class="store-input" type="text" id="newStoreName" placeholder="Add store name..." onkeydown="if(event.key==='Enter')addStore()" style="width:100%;margin-bottom:8px;">
    <button class="btn btn-blue" style="width:100%;padding:9px 0;margin-bottom:12px;" onclick="addStore()">+ Add Store</button>
    <ul class="store-list" id="storeList"></ul>
  </div>
</div>

<script>
const PRODUCTS = [
  { id:1,  brand:'Pepsi',      name:'Pepsi',                                 sizes:['20oz','2L','12pk','24pk'] },
  { id:2,  brand:'Pepsi',      name:'Diet Pepsi',                            sizes:['20oz','2L','12pk','24pk'] },
  { id:3,  brand:'Pepsi',      name:'Pepsi Zero Sugar',                      sizes:['20oz','2L','12pk','24pk'] },
  { id:4,  brand:'Pepsi',      name:'Caffeine Free Pepsi',                   sizes:['2L','12pk'] },
  { id:5,  brand:'Pepsi',      name:'Caffeine Free Diet Pepsi',              sizes:['2L','12pk'] },
  { id:6,  brand:'Pepsi',      name:'Pepsi Throwback',                       sizes:['20oz','2L','12pk'] },
  { id:7,  brand:'Pepsi',      name:'Cherry Pepsi',                          sizes:['20oz','2L','12pk'] },
  { id:8,  brand:'Pepsi',      name:'Pepsi Zero Sugar Cherry',               sizes:['20oz','12pk'] },
  { id:9,  brand:'Pepsi',      name:'Cherry & Cream Pepsi',                  sizes:['20oz','12pk'] },
  { id:10, brand:'Pepsi',      name:'Zero Sugar Cherry & Cream Pepsi',       sizes:['20oz','12pk'] },
  { id:11, brand:'Mtn Dew',    name:'Mountain Dew',                          sizes:['20oz','2L','12pk','24pk'] },
  { id:12, brand:'Mtn Dew',    name:'Diet Mountain Dew',                     sizes:['20oz','2L','12pk','24pk'] },
  { id:13, brand:'Mtn Dew',    name:'Mountain Dew Zero Sugar',               sizes:['20oz','2L','12pk'] },
  { id:14, brand:'Mtn Dew',    name:'Mtn Dew Code Red',                      sizes:['20oz','2L','12pk'] },
  { id:15, brand:'Mtn Dew',    name:'Mtn Dew Baja Blast',                    sizes:['20oz','12pk'] },
  { id:16, brand:'Mtn Dew',    name:'Mtn Dew Voltage',                       sizes:['20oz','2L','12pk'] },
  { id:17, brand:'Mtn Dew',    name:'Mtn Dew Cabo Punch',                    sizes:['20oz','12pk'] },
  { id:18, brand:'Mtn Dew',    name:'Mtn Dew Cabo Punch Zero Sugar',         sizes:['20oz','12pk'] },
  { id:19, brand:'Starry',     name:'Starry',                                sizes:['20oz','2L','12pk','24pk'] },
  { id:20, brand:'Crush',      name:'Orange Crush',                          sizes:['20oz','2L','12pk'] },
  { id:21, brand:'Crush',      name:'Grape Crush',                           sizes:['20oz','2L','12pk'] },
  { id:22, brand:'Crush',      name:'Peach Crush',                           sizes:['20oz','12pk'] },
  { id:23, brand:'Ginger Ale', name:'Schweppes Ginger Ale',                  sizes:['20oz','2L','12pk'] },
  { id:24, brand:'Dr Pepper',  name:'Dr Pepper',                             sizes:['20oz','2L','12pk','24pk'] },
  { id:25, brand:'Dr Pepper',  name:'Diet Dr Pepper',                        sizes:['20oz','2L','12pk','24pk'] },
  { id:26, brand:'Dr Pepper',  name:'Dr Pepper Zero Sugar',                  sizes:['20oz','2L','12pk'] },
  { id:27, brand:'Dr Pepper',  name:'Dr Pepper Cream',                       sizes:['20oz','2L','12pk'] },
  { id:28, brand:'Dr Pepper',  name:'Dr Pepper Cream Zero Sugar',            sizes:['20oz','12pk'] },
  { id:29, brand:'Dr Pepper',  name:'Cherry Dr Pepper',                      sizes:['20oz','2L','12pk'] },
  { id:30, brand:'Dr Pepper',  name:'Cherry Dr Pepper Zero Sugar',           sizes:['20oz','12pk'] },
  { id:31, brand:'Dr Pepper',  name:'Strawberry Cream Dr Pepper',            sizes:['20oz','12pk'] },
  { id:32, brand:'Dr Pepper',  name:'Strawberry Cream Dr Pepper Zero Sugar', sizes:['20oz','12pk'] },
];
const BRANDS = [...new Set(PRODUCTS.map(p=>p.brand))];
const SIZE_LABELS = {'20oz':'20oz Singles','2L':'2-Liter Bottles','12pk':'12-Pack Cans','24pk':'24-Pack Cases'};
const SIZE_PILL   = {'20oz':'pill-20oz','2L':'pill-2L','12pk':'pill-12pk','24pk':'pill-24pk'};

let state = {
  stores: ['Walmart #1042','Kroger - Main St','Target #0832'],
  activeStore: 'Walmart #1042',
  activeBrand: 'all',
  activeTab: 'cooler',
  displaySize: '12pk',
  sizeFilter: { cooler:'all', shelf:'all', display:'all' },
  data: {}
};

function getCell(store, prodId, size, section) {
  if (!state.data[store]) state.data[store] = {};
  const k = `${prodId}_${size}_${section}`;
  if (!state.data[store][k]) state.data[store][k] = { pull:'0', na:false };
  return state.data[store][k];
}

function stepper(prodId, size, section, cell) {
  const d = cell.na?'disabled':'', dc = cell.na?'stepper-disabled':'';
  return `<div class="stepper ${dc}">
    <button class="step-btn step-minus" onclick="stepCell(${prodId},'${size}','${section}',-5)" ${d}>−5</button>
    <button class="step-btn step-minus" onclick="stepCell(${prodId},'${size}','${section}',-2)" ${d}>−2</button>
    <button class="step-btn step-minus" onclick="stepCell(${prodId},'${size}','${section}',-1)" ${d}>−1</button>
    <div class="step-divider"></div>
    <span class="step-val" id="sv_${prodId}_${size}_${section}">${cell.pull||'0'}</span>
    <div class="step-divider"></div>
    <button class="step-btn step-plus" onclick="stepCell(${prodId},'${size}','${section}',1)" ${d}>+1</button>
    <button class="step-btn step-plus" onclick="stepCell(${prodId},'${size}','${section}',2)" ${d}>+2</button>
    <button class="step-btn step-plus" onclick="stepCell(${prodId},'${size}','${section}',5)" ${d}>+5</button>
  </div>`;
}

// Build content grouped by SIZE first, then brand within each size
function buildSizeGrouped(contentId, sizesToShow, section) {
  const activeFilter = state.sizeFilter[section];
  const sizes = activeFilter === 'all' ? sizesToShow : sizesToShow.filter(s=>s===activeFilter);
  let html = '';

  sizes.forEach(size => {
    const prodsForSize = PRODUCTS.filter(p => {
      if (state.activeBrand !== 'all' && p.brand !== state.activeBrand) return false;
      return p.sizes.includes(size);
    });
    if (!prodsForSize.length) return;

    const count = prodsForSize.length;
    html += `<div class="size-group" id="group_${section}_${size}">
      <div class="size-group-header">
        <span class="size-group-pill ${SIZE_PILL[size]}">${SIZE_LABELS[size]}</span>
        <span class="size-group-count">${count} products</span>
      </div>
      <table>
        <thead><tr>
          <th style="width:26px">N/A</th>
          <th>Product</th>
          <th class="center">Pull Qty</th>
        </tr></thead>
        <tbody>`;

    let lastBrand = null;
    prodsForSize.forEach(prod => {
      const cell = getCell(state.activeStore, prod.id, size, section);
      if (prod.brand !== lastBrand) {
        html += `<tr class="brand-row"><td colspan="3">${prod.brand}</td></tr>`;
        lastBrand = prod.brand;
      }
      html += `<tr>
        <td style="text-align:center"><input type="checkbox" class="na-toggle" ${cell.na?'checked':''} onchange="toggleNA(${prod.id},'${size}','${section}',this.checked)"></td>
        <td><div class="prod-name">${prod.name}</div></td>
        <td style="text-align:center">${stepper(prod.id,size,section,cell)}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  });

  document.getElementById(contentId).innerHTML = html;
}

function renderCooler()  { buildSizeGrouped('coolerContent',  ['20oz'],              'cooler'); }
function renderShelf()   { buildSizeGrouped('shelfContent',   ['2L','12pk','24pk'],  'shelf'); }
function renderDisplay() { buildSizeGrouped('displayContent', [state.displaySize],   'display'); }

function renderCats() {
  const el = document.getElementById('catFilters');
  const counts = {};
  PRODUCTS.forEach(p => { counts[p.brand]=(counts[p.brand]||0)+1; });
  el.innerHTML = `<button class="cat-btn ${state.activeBrand==='all'?'active':''}" onclick="selectBrand('all')">All Brands <span class="cat-count">${PRODUCTS.length}</span></button>`
    + BRANDS.map(b=>`<button class="cat-btn ${state.activeBrand===b?'active':''}" onclick="selectBrand('${b}')">${b} <span class="cat-count">${counts[b]}</span></button>`).join('');
}

function updateTabCounts() {
  const store = state.activeStore;
  let cooler=0, shelf=0, display=0;
  PRODUCTS.forEach(p => {
    if(p.sizes.includes('20oz')){ const c=getCell(store,p.id,'20oz','cooler'); if(!c.na&&parseInt(c.pull)>0) cooler++; }
    ['2L','12pk','24pk'].forEach(s=>{ if(p.sizes.includes(s)){ const c=getCell(store,p.id,s,'shelf'); if(!c.na&&parseInt(c.pull)>0) shelf++; }});
    if(p.sizes.includes(state.displaySize)){ const c=getCell(store,p.id,state.displaySize,'display'); if(!c.na&&parseInt(c.pull)>0) display++; }
  });
  document.getElementById('tc-cooler').textContent  = cooler||'—';
  document.getElementById('tc-shelf').textContent   = shelf||'—';
  document.getElementById('tc-display').textContent = display||'—';
}

function renderAll() {
  renderCats(); renderCooler(); renderShelf(); renderDisplay(); updateTabCounts(); renderStoreList();
  document.getElementById('headerStore').textContent = state.activeStore||'Select Store';
}

function renderStoreList() {
  document.getElementById('storeList').innerHTML = state.stores.map(s=>`
    <li class="store-item ${s===state.activeStore?'active':''}" onclick="selectStore('${s.replace(/'/g,"\\'")}')">
      <div class="store-item-left"><span class="store-dot"></span>${s}</div>
      <span class="store-del" onclick="event.stopPropagation();deleteStore('${s.replace(/'/g,"\\'")}')">✕</span>
    </li>`).join('');
}

function switchTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.className='tab-btn');
  document.getElementById('tab-'+tab).classList.add('active-'+tab);
}

function setSizeFilter(section, size, el) {
  state.sizeFilter[section] = size;
  // update button states within this page's filter bar
  const bar = el.closest('.size-filter-bar');
  bar.querySelectorAll('.size-filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  // scroll to that group if "all", or just re-render filtered
  if (section==='cooler') renderCooler();
  else if (section==='shelf') renderShelf();
  else renderDisplay();
  // scroll to top of table wrap
  const wrap = document.getElementById(section+'TableWrap');
  if (wrap) wrap.scrollTop = 0;
}

function stepCell(prodId, size, section, delta) {
  const cell = getCell(state.activeStore, prodId, size, section);
  const newVal = Math.max(0,(parseInt(cell.pull)||0)+delta);
  cell.pull = String(newVal);
  const el = document.getElementById(`sv_${prodId}_${size}_${section}`);
  if (el) el.textContent = newVal;
  updateTabCounts();
}

function toggleNA(prodId, size, section, checked) {
  getCell(state.activeStore, prodId, size, section).na = checked;
  if(section==='cooler') renderCooler();
  else if(section==='shelf') renderShelf();
  else renderDisplay();
}

function selectStore(name) {
  state.activeStore = name;
  document.getElementById('headerStore').textContent = name;
  renderAll(); closeStoreModal();
}

function selectBrand(brand) {
  state.activeBrand = brand; renderCats(); renderCooler(); renderShelf(); renderDisplay();
}

function setDisplaySize(size, el) {
  state.displaySize = size;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderDisplay(); updateTabCounts();
}

function addStore() {
  const input = document.getElementById('newStoreName');
  const name = input.value.trim();
  if (!name || state.stores.includes(name)) return;
  state.stores.push(name); state.activeStore = name; input.value = ''; renderAll();
}

function deleteStore(name) {
  if (!confirm(`Remove "${name}"?`)) return;
  state.stores = state.stores.filter(s=>s!==name);
  if (state.activeStore===name) state.activeStore = state.stores[0]||'';
  renderAll();
}

function openStoreModal()  { document.getElementById('storeModal').classList.add('open'); renderStoreList(); }
function closeStoreModal() { document.getElementById('storeModal').classList.remove('open'); }

function clearSection(section) {
  if (!confirm(`Clear all ${section} counts?`)) return;
  if (state.data[state.activeStore]) {
    Object.keys(state.data[state.activeStore]).forEach(k => {
      if (k.endsWith('_'+section)) state.data[state.activeStore][k].pull = '0';
    });
  }
  if(section==='cooler') renderCooler();
  else if(section==='shelf') renderShelf();
  else renderDisplay();
  updateTabCounts();
}

function clearAll() {
  if (!confirm('Clear all pull quantities for this store?')) return;
  state.data[state.activeStore] = {};
  renderAll();
  document.getElementById('pullBody').innerHTML = `<div class="empty-pull"><div class="empty-icon">📦</div>All counts cleared.</div>`;
  document.getElementById('pullMeta').textContent = 'Enter quantities & generate';
}

function generatePull() {
  const store = state.activeStore;
  const sections = [
    { key:'cooler',  label:'🧊 COOLER — 20oz Singles', items:[] },
    { key:'shelf',   label:'🛒 SHELF', items:[] },
    { key:'display', label:'🏪 DISPLAY — '+(state.displaySize==='12pk'?'12-Pack':'24-Pack'), items:[] },
  ];
  PRODUCTS.forEach(p => {
    if(p.sizes.includes('20oz')){ const c=getCell(store,p.id,'20oz','cooler'); const pull=parseInt(c.pull)||0; if(!c.na&&pull>0) sections[0].items.push({name:p.name,size:'20oz',pull}); }
    ['2L','12pk','24pk'].forEach(s=>{ if(p.sizes.includes(s)){ const c=getCell(store,p.id,s,'shelf'); const pull=parseInt(c.pull)||0; if(!c.na&&pull>0) sections[1].items.push({name:p.name,size:s,pull}); }});
    const dSize=state.displaySize; if(p.sizes.includes(dSize)){ const c=getCell(store,p.id,dSize,'display'); const pull=parseInt(c.pull)||0; if(!c.na&&pull>0) sections[2].items.push({name:p.name,size:dSize,pull}); }
  });
  const total = sections.reduce((a,s)=>a+s.items.length,0);
  const body = document.getElementById('pullBody');
  if (!total) {
    body.innerHTML = `<div class="empty-pull"><div class="empty-icon">✅</div>Nothing to pull! All zeros.</div>`;
    document.getElementById('pullMeta').textContent = 'Nothing to pull';
    return;
  }
  document.getElementById('pullMeta').textContent = `${total} item${total>1?'s':''} · ${store}`;
  let html = '';
  sections.forEach(sec => {
    if (!sec.items.length) return;
    sec.items.sort((a,b)=>b.pull-a.pull);
    html += `<div class="pull-section-label">${sec.label}</div>`;
    html += sec.items.map(item=>`
      <div class="pull-item ${item.pull>=5?'large':''}">
        <div><div class="pull-item-name">${item.name}</div><div class="pull-item-size">${SIZE_LABELS[item.size]||item.size}</div></div>
        <div class="pull-item-qty">+${item.pull}</div>
      </div>`).join('');
  });
  body.innerHTML = html;
}

renderAll();
</script>
</body>
</html>
